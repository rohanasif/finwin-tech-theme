<!DOCTYPE html>
<html lang="en">

<head>
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://kit.fontawesome.com/724eb3146a.js" crossorigin="anonymous"></script>
</head>

<body>
    <div class="w-full h-screen bg flex relative">
        <nav class="h-[20vh] w-[90%] mx-auto flex justify-between items-center">
            <div class="cursor-pointer">
                <img class="w-[134px] h-[40px]" src="./images/download2.png">
            </div>
            <div class="flex lg:hidden"><i class="fa-solid fa-bars text-white"></i></div>
            <ul class="hidden items-center justify-evenly w-full text-white lg:flex">
                <li class="cursor-pointer li">
                    <div>Services</div>
                    <div class="line"></div>
                </li>
                <li class="cursor-pointer li">
                    <div>Technologies</div>
                    <div class="line"></div>
                </li>
                <li class="cursor-pointer li">
                    <div>Portfolio</div>
                    <div class="line"></div>
                </li>
                <li class="cursor-pointer li">
                    <div>Blog</div>
                    <div class="line"></div>
                </li>
                <li class="cursor-pointer li">
                    <div>Career</div>
                    <div class="line"></div>
                </li>
                <li class="cursor-pointer li">
                    <div>Company</div>
                    <div class="line"></div>
                </li>
                <li class="cursor-pointer"><i class="fa-solid fa-magnifying-glass"></i></li>
                <a class="bg-[#0d8ee9] px-[26px] pb-[15px] pt-[13px] rounded-full cursor-pointer">Contact Us</a>
                <a class="cursor-pointer">EN</a>
            </ul>
        </nav>
        <div class="absolute top-[300px] left-[50px] text-white">
            <h1 class="text-[57px] font-black">Engineering the Future</h1>
            <p class="text-[22px]">Custom software development services</p>
        </div>
        <div class="arrow absolute text-white cursor-pointer text-5xl bottom-10 left-16">
            <i class="fa-solid fa-arrow-down"></i>
        </div>
        <div class="icons fixed right-16 bottom-10">
            <div class="cursor-pointer whatsapp text-white rounded-full bg-[#0d8ee9] mb-3">
                <i class="fa-brands fa-whatsapp text-[42px] p-3"></i>
            </div>
            <div class="cursor-pointer email text-white rounded-full bg-[#0d8ee9]"><i
                    class="fa-regular fa-envelope text-[42px] p-3"></i>
            </div>
        </div>

    </div>
</body>

</html>
